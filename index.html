<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog fotek — Martin Guía</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }
  .header { background: #1d1d1f; color: white; padding: 24px 32px; }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header p { color: #a1a1a6; font-size: 14px; margin-top: 4px; }
  .controls { background: white; padding: 14px 32px; border-bottom: 1px solid #e5e5ea; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 14px; outline: none; }
  .search-wrap input:focus { border-color: #0071e3; }
  .search-wrap::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; }
  select { padding: 9px 12px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 14px; background: white; outline: none; cursor: pointer; }
  select:focus { border-color: #0071e3; }
  .count { margin-left: auto; font-size: 13px; color: #6e6e73; white-space: nowrap; font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 24px 32px; }
  .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .card.editing { box-shadow: 0 0 0 3px #0071e3, 0 8px 24px rgba(0,0,0,0.15); transform: none; }
  .thumb { width: 100%; height: 200px; object-fit: cover; background: #f0f0f0; display: block; }
  .thumb-placeholder { width: 100%; height: 200px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 48px; }
  .thumb-wrap { position: relative; }
  .video-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.6); border-radius: 50%; width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; font-size: 22px; pointer-events: none; }
  .thumb-video-placeholder { width: 100%; height: 200px; background: #1d1d1f; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: white; font-size: 40px; }
  .thumb-video-placeholder span { font-size: 13px; color: #a1a1a6; }
  .btn-play { flex: 1; background: #ff3b30; color: white; border: none; padding: 9px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-play:hover { background: #cc2900; }
  .gps-banner { background: linear-gradient(135deg, #ff3b30, #ff6b35); color: white; padding: 8px 16px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .card-body { padding: 14px 16px 16px; }
  .desc { font-size: 14px; font-weight: 600; color: #1d1d1f; line-height: 1.4; margin-bottom: 10px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .tag-obsah      { background: #f5f0ff; color: #6e2fcc; cursor: pointer; }
  .tag-obsah:hover { background: #e8d9ff; }
  .tag-druh       { background: #f0fff4; color: #1a7f37; font-style: italic; }
  .tag-vlastní    { background: #e8f4fd; color: #0071e3; }
  .tag-screenshot { background: #fff3cd; color: #856404; }
  .tag-stažená    { background: #fde8e8; color: #cc2900; }
  .tag-neznámý    { background: #f0f0f5; color: #6e6e73; }
  .meta { font-size: 12px; color: #8e8e93; margin-bottom: 12px; word-break: break-all; }
  .edit-mode { display: none; }
  .card.editing .view-mode { display: none; }
  .card.editing .edit-mode { display: block; }
  .edit-mode label { display: block; font-size: 12px; font-weight: 600; color: #6e6e73; margin-bottom: 3px; margin-top: 10px; }
  .edit-mode label:first-child { margin-top: 0; }
  .edit-mode input, .edit-mode select, .edit-mode textarea { width: 100%; padding: 7px 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; background: #fafafa; }
  .edit-mode input:focus, .edit-mode select:focus, .edit-mode textarea:focus { border-color: #0071e3; background: white; }
  .edit-mode textarea { resize: vertical; min-height: 60px; }
  .btns { display: flex; gap: 8px; margin-top: 12px; }
  .btn-open { flex: 1; background: #0071e3; color: white; border: none; padding: 9px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-open:hover { background: #005bbf; }
  .btn-edit { background: #f0f0f5; color: #1d1d1f; border: none; padding: 9px 12px; border-radius: 10px; font-size: 14px; cursor: pointer; }
  .btn-edit:hover { background: #e5e5ea; }
  .btn-save { flex: 1; background: #34c759; color: white; border: none; padding: 9px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-save:hover { background: #28a745; }
  .btn-save:disabled { background: #a1a1a6; cursor: not-allowed; }
  .btn-cancel { background: #f0f0f5; color: #1d1d1f; border: none; padding: 9px 12px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-cancel:hover { background: #e5e5ea; }
  .save-msg { font-size: 12px; color: #34c759; margin-top: 6px; text-align: center; display: none; }
  .save-err { font-size: 12px; color: #ff3b30; margin-top: 6px; text-align: center; display: none; }
  .loading { text-align: center; padding: 80px; font-size: 18px; color: #6e6e73; }
  .empty { text-align: center; padding: 80px; font-size: 16px; color: #6e6e73; }
  .pagination { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 24px 32px; }
  .btn-page { background: white; border: 1px solid #d2d2d7; border-radius: 10px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; color: #1d1d1f; }
  .btn-page:hover:not(:disabled) { background: #f0f0f5; }
  .btn-page:disabled { opacity: 0.35; cursor: not-allowed; }
  .page-info { font-size: 13px; color: #6e6e73; min-width: 120px; text-align: center; }
  @media (max-width: 600px) {
    .controls { padding: 12px 16px; }
    .grid { padding: 16px; gap: 14px; }
    .header { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📷 Katalog fotek — Martin Guía</h1>
  <p id="subtitle">Načítám…</p>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Hledat…" oninput="render()">
  </div>
  <select id="filObsah" onchange="render()">
    <option value="">Vše — obsah</option>
  </select>
  <select id="filGps" onchange="render()">
    <option value="">📍 Všechna místa</option>
    <option value="ano" selected>📍 Má GPS lokaci</option>
    <option value="ne">Bez GPS</option>
  </select>
  <select id="filMisto" onchange="render()">
    <option value="">🌍 Všechna místa</option>
  </select>
  <select id="filZdroj" onchange="render()">
    <option value="">Všechny zdroje</option>
    <option value="vlastní">📱 Vlastní fotky</option>
    <option value="screenshot">🖥️ Screenshoty</option>
    <option value="stažená">🌐 Stažené</option>
    <option value="neznámý">❓ Neznámý</option>
  </select>
  <span class="count" id="count"></span>
</div>

<div id="grid" class="grid">
  <div class="loading">⏳ Načítám katalog…</div>
</div>
<div class="pagination" id="pagination" style="display:none">
  <button class="btn-page" id="btn-prev" onclick="changePage(-1)">← Předchozí</button>
  <span class="page-info" id="page-info"></span>
  <button class="btn-page" id="btn-next" onclick="changePage(1)">Další →</button>
</div>

<script>
var DATA = [];
var FILTERED = [];
var PAGE = 0;
var PAGE_SIZE = 48;
var KAT_OPTIONS = ['Lidé','Příroda','Architektura','Ostatní'];
var MISTO_OPTIONS = [];
var ZDROJ_ICON = {'vlastní':'📱','screenshot':'🖥️','stažená':'🌐','neznámý':'❓'};
var GPS_NAZVY = {
  '9.748900,-83.753400': 'Kostarika',
  '9.838900,-83.931700': 'Sanatorio Durán, Kostarika',
  '10.531800,-83.502200': 'Tortuguero, Kostarika',
  '9.928100,-84.090700': 'San José, Kostarika',
  '9.990800,-83.036500': 'Limón, Kostarika',
  '9.900800,-83.680800': 'Turrialba, Kostarika',
  '9.990800,-83.781700': 'Vulkán Turrialba, Kostarika',
  '10.158300,-84.691700': 'Vodopády Las Trilizas, Kostarika',
  '10.500000,-85.633300': 'Sardinal, Kostarika',
  '9.633300,-82.833300': 'Bribri, Kostarika',
  '5.526700,-87.061100': 'Kokosový ostrov, Kostarika',
  '8.683300,-82.050000': 'Hornito, Panama',
  '8.050000,-77.700000': 'Playa Muerto, Darién, Panama',
  '8.993600,-79.519700': 'Panama City, Panama',
  '9.364700,-79.900300': 'Colón, Panama',
  '9.583300,-78.966700': 'San Blas / Guna Yala, Panama',
  '9.166700,-79.666700': 'Emberá, Panama',
  '8.700000,-80.000000': 'El Níspero, Panama',
  '9.557700,-79.651900': 'Portobelo, Panama',
};
var PRIRODA_OBSAH = ['Zvíře','Mořský život','Příroda / Rostliny','Vodopád','Hory / Krajina'];
// Apps Script URL pro ukládání editací
var SAVE_URL = 'APPS_SCRIPT_URL_ZDE';

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function druhJistota(druh) {
  if (!druh) return 0;
  var m = druh.match(/\((\d+\.?\d*)%\)/);
  return m ? parseFloat(m[1]) : 0;
}

function cardHtml(r, i) {
  var thumbUrl = r.id ? 'https://drive.google.com/thumbnail?id=' + r.id + '&sz=w300' : '';
  var fileUrl  = r.id ? 'https://drive.google.com/file/d/' + r.id + '/view' : '#';

  var isVideo = r.video === true;
  var thumbInner = isVideo
    ? '<div class="thumb-video-placeholder">🎬<span>Video</span></div>'
    : (thumbUrl
        ? '<img class="thumb" src="' + thumbUrl + '" alt="" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=\\\'thumb-placeholder\\\'>🖼️</div>\'">'
        : '<div class="thumb-placeholder">🖼️</div>');
  var thumbHtml = '<div class="thumb-wrap">' + thumbInner + (isVideo ? '<div class="video-badge">▶️</div>' : '') + '</div>';

  var gpsLabel = r.misto || (r.gps ? (GPS_NAZVY[r.gps] || r.gps) : '');
  var gpsBanner = gpsLabel ? '<div class="gps-banner">📍 ' + esc(gpsLabel) + '</div>' : '';

  var tags = '';
  if (r.obsah) tags += '<span class="tag tag-obsah" onclick="filterByObsah(\'' + r.obsah.replace(/'/g,"\\'") + '\')" title="Filtrovat: ' + esc(r.obsah) + '">' + esc(r.obsah) + '</span>';
  if (r.druh && druhJistota(r.druh) >= 50 && PRIRODA_OBSAH.indexOf(r.obsah) >= 0) {
    tags += '<span class="tag tag-druh">🔬 ' + esc(r.druh) + '</span>';
  }
  var zdroj = r.zdroj || 'neznámý';
  tags += '<span class="tag tag-' + esc(zdroj) + '">' + (ZDROJ_ICON[zdroj]||'❓') + ' ' + esc(zdroj) + '</span>';

  var OBSAH_OPTIONS = ['Moře / Pobřeží','Vodopád','Řeka / Jezero','Hory / Krajina',
    'Příroda / Rostliny','Mořský život','Zvíře','Původní obyvatelé',
    'Lidé — portréty','Lidé','Jídlo / Trh','Památky / Ruiny',
    'Město / Architektura','Loď / Plavba','Mapa / Dokument','Ostatní'];
  var obsahOpts = OBSAH_OPTIONS.map(function(o) {
    return '<option value="' + o + '"' + (r.obsah===o?' selected':'') + '>' + o + '</option>';
  }).join('');
  var zdrojOpts = ['vlastní','screenshot','stažená','neznámý'].map(function(z) {
    return '<option value="' + z + '"' + (zdroj===z?' selected':'') + '>' + (ZDROJ_ICON[z]||'❓') + ' ' + z + '</option>';
  }).join('');

  return '<div class="card" id="card-' + i + '">'
    + thumbHtml + gpsBanner
    + '<div class="card-body">'
    + '<div class="view-mode">'
    + '<div class="desc">' + esc(r.popis||'—') + '</div>'
    + '<div class="tags">' + tags + '</div>'
    + (r.nazev ? '<div class="meta">📄 ' + esc(r.nazev) + '</div>' : '')
    + '<div class="btns">'
    + (isVideo
        ? '<a class="btn-play" href="' + fileUrl + '" target="_blank">▶ Přehrát video</a>'
        : '<a class="btn-open" href="' + fileUrl + '" target="_blank">🔍 Otevřít fotku</a>')
    + '<button class="btn-edit" onclick="startEdit(' + i + ')">✏️</button>'
    + '</div></div>'
    + '<div class="edit-mode">'
    + '<label>Popis</label><textarea id="e-popis-' + i + '">' + esc(r.popis||'') + '</textarea>'
    + '<label>Typ obsahu</label><select id="e-obsah-' + i + '">' + obsahOpts + '</select>'
    + '<label>Místo</label><select id="e-misto-' + i + '">'
    + '<option value="">— bez místa —</option>'
    + MISTO_OPTIONS.map(function(m){ return '<option value="' + esc(m) + '"' + ((r.misto||'')=== m?' selected':'') + '>' + esc(m) + '</option>'; }).join('')
    + '</select>'
    + '<label>Druh (rostlina / zvíře)</label><input type="text" id="e-druh-' + i + '" value="' + esc(r.druh||'') + '">'
    + '<label>Zdroj</label><select id="e-zdroj-' + i + '">' + zdrojOpts + '</select>'
    + '<label>Název souboru</label><input type="text" id="e-nazev-' + i + '" value="' + esc(r.nazev||'') + '">'
    + '<div class="btns">'
    + '<button class="btn-save" id="btn-save-' + i + '" onclick="saveEdit(' + i + ')">💾 Uložit</button>'
    + '<button class="btn-cancel" onclick="cancelEdit(' + i + ')">Zrušit</button>'
    + '</div>'
    + '<div class="save-msg" id="msg-' + i + '">✅ Uloženo!</div>'
    + '<div class="save-err" id="err-' + i + '"></div>'
    + '</div></div></div>';
}

function startEdit(i)  { document.getElementById('card-'+i).classList.add('editing'); }
function cancelEdit(i) {
  document.getElementById('card-'+i).classList.remove('editing');
  document.getElementById('msg-'+i).style.display='none';
  document.getElementById('err-'+i).style.display='none';
}

function saveEdit(i) {
  var r = DATA[i];
  var btn = document.getElementById('btn-save-'+i);
  btn.disabled=true; btn.textContent='⏳ Ukládám…';
  var nd = {
    id:    r.id,
    popis: document.getElementById('e-popis-'+i).value,
    obsah: document.getElementById('e-obsah-'+i).value,
    gps:   r.gps || '',
    misto: document.getElementById('e-misto-'+i).value,
    druh:  document.getElementById('e-druh-'+i).value,
    zdroj: document.getElementById('e-zdroj-'+i).value,
    nazev: document.getElementById('e-nazev-'+i).value
  };
  var SAVE_URL = 'https://script.google.com/macros/s/AKfycbzOYTX0w_1W7CBWS1ibGoqMzjnE89iKMazJz72SmfKuSpCE_R9mDLK5AeB4LJd4t9HS/exec';
  var blob = new Blob([JSON.stringify(nd)], {type: 'text/plain'});
  navigator.sendBeacon(SAVE_URL, blob);
  // sendBeacon je fire-and-forget — ukážeme úspěch okamžitě
  Object.assign(DATA[i], nd);
  btn.disabled=false; btn.textContent='💾 Uložit';
  document.getElementById('msg-'+i).style.display='block';
  setTimeout(function() { cancelEdit(i); rerenderCard(i); }, 1200);
}

function rerenderCard(i) {
  var el=document.getElementById('card-'+i);
  if(!el) return;
  var tmp=document.createElement('div');
  tmp.innerHTML=cardHtml(DATA[i],i);
  el.parentNode.replaceChild(tmp.firstChild,el);
}

function filterByObsah(obsah) {
  document.getElementById('filObsah').value = obsah;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function render() {
  var q        = document.getElementById('search').value.toLowerCase();
  var filObs   = document.getElementById('filObsah').value;
  var filGps   = document.getElementById('filGps').value;
  var filZdroj = document.getElementById('filZdroj').value;
  var filMisto = document.getElementById('filMisto').value;

  // Filtrování
  FILTERED = [];
  for(var i=0;i<DATA.length;i++) {
    var r=DATA[i];
    if(filObs   && r.obsah!==filObs) continue;
    if(filGps==='ano' && !r.gps && !r.misto) continue;
    if(filGps==='ne'  && (r.gps || r.misto)) continue;
    if(filZdroj && (r.zdroj||'neznámý')!==filZdroj) continue;
    if(filMisto && (r.misto||'') !== filMisto)        continue;
    if(q) {
      var hay=[r.popis,r.kat,r.obsah,r.gps,r.druh,r.nazev,r.zdroj].join(' ').toLowerCase();
      if(hay.indexOf(q)===-1) continue;
    }
    FILTERED.push(i);
  }

  // Řazení: fotky s GPS lokací vždy první
  FILTERED.sort(function(a, b) {
    var aGps = DATA[a].gps ? 1 : 0;
    var bGps = DATA[b].gps ? 1 : 0;
    return bGps - aGps;
  });

  PAGE = 0;
  renderPage();
}

function renderPage() {
  var total = FILTERED.length;
  var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  var start = PAGE * PAGE_SIZE;
  var end = Math.min(start + PAGE_SIZE, total);
  var pageItems = FILTERED.slice(start, end);

  var html = '';
  for(var j = 0; j < pageItems.length; j++) {
    html += cardHtml(DATA[pageItems[j]], pageItems[j]);
  }

  document.getElementById('count').textContent = total + ' fotek';
  document.getElementById('grid').innerHTML = html || '<div class="empty">🔍 Nic nenalezeno</div>';

  // Pagination
  var pag = document.getElementById('pagination');
  pag.style.display = totalPages > 1 ? 'flex' : 'none';
  document.getElementById('btn-prev').disabled = PAGE === 0;
  document.getElementById('btn-next').disabled = PAGE >= totalPages - 1;
  document.getElementById('page-info').textContent = 'Strana ' + (PAGE+1) + ' / ' + totalPages;

  window.scrollTo({top: 0, behavior: 'smooth'});
}

function changePage(dir) {
  var totalPages = Math.ceil(FILTERED.length / PAGE_SIZE);
  PAGE = Math.max(0, Math.min(PAGE + dir, totalPages - 1));
  renderPage();
}

function init(data) {
  DATA = data;

  // Obsah dropdown
  var obsahSet={};
  for(var i=0;i<DATA.length;i++) if(DATA[i].obsah) obsahSet[DATA[i].obsah]=1;
  var selObs=document.getElementById('filObsah');
  Object.keys(obsahSet).sort().forEach(function(o){
    var opt=document.createElement('option'); opt.value=o; opt.textContent=o; selObs.appendChild(opt);
  });

  // Naplň globální MISTO_OPTIONS pro edit formy
  var mistaSetAll={};
  for(var i=0;i<DATA.length;i++) if(DATA[i].misto) mistaSetAll[DATA[i].misto]=1;
  MISTO_OPTIONS = Object.keys(mistaSetAll).sort();

  // Místa dropdown — dynamicky z dat
  var mistaSet={};
  for(var i=0;i<DATA.length;i++){
    var nazev = DATA[i].misto || null;
    if(nazev) mistaSet[nazev]=1;
  }
  var selMisto=document.getElementById('filMisto');
  var panama=[], kostarika=[], nikaragua=[], ostatni=[];
  Object.keys(mistaSet).sort().forEach(function(m){
    var isPanama = m.indexOf('Panama')>-1 || m.indexOf('Emberá')>-1 || m.indexOf('Embera')>-1 || m.indexOf('Valle de Antón')>-1 || m.indexOf('San Lorenzo')>-1 || m.indexOf('Guna Yala')>-1 || m.indexOf('Senidub')>-1;
    var isKostarika = m.indexOf('Kostarika')>-1 || m.indexOf('Cahuita')>-1 || m.indexOf('Liberia')>-1;
    if(isPanama) panama.push(m);
    else if(isKostarika) kostarika.push(m);
    else if(m.indexOf('Nikaragua')>-1) nikaragua.push(m);
    else ostatni.push(m);
  });
  function addGroup(label, items, strip){
    if(!items.length) return;
    var g=document.createElement('optgroup'); g.label=label;
    items.forEach(function(m){
      var opt=document.createElement('option'); opt.value=m;
      opt.textContent=strip?m.replace(strip,''):m;
      g.appendChild(opt);
    });
    selMisto.appendChild(g);
  }
  addGroup('🇵🇦 Panama', panama, ', Panama');
  addGroup('🇨🇷 Kostarika', kostarika, ', Kostarika');
  addGroup('🇳🇮 Nikaragua', nikaragua, '');
  addGroup('🌍 Ostatní', ostatni, '');

  document.getElementById('subtitle').textContent=DATA.length+' fotek · AI katalogizace';
  render();
}

fetch('katalog_data.json')
  .then(function(r){ return r.json(); })
  .then(init)
  .catch(function(e){
